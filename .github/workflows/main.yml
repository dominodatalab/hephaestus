name: CI
on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  pull_request: {}
env:
  GO_VERSION: "1.26"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('tools/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-tools-
      - name: Lint
        run: make lint
      - name: Sanity check
        run: make check
      - name: Build
        run: make build
      - name: Unit test
        run: make test

  docker-build:
    runs-on: ${{ matrix.runner }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64 builds on standard runner
          - dockerfile: ./Dockerfile
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: ""
          - dockerfile: ./Dockerfile.debug
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: "-debug"
          # arm64 builds on native ARM runner
          - dockerfile: ./Dockerfile
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: ""
          - dockerfile: ./Dockerfile.debug
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: "-debug"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get the Git tag
        id: version
        shell: bash
        run: |
          echo "tag=$(git describe --tags --always)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: dominodatalab
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        env:
          DOCKER_METADATA_PR_HEAD_SHA: "true"
        with:
          images: |
            quay.io/domino/hephaestus
            ghcr.io/dominodatalab/hephaestus
          flavor: |
            suffix=${{ matrix.suffix }}-${{ matrix.arch }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          file: ${{ matrix.dockerfile }}
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.dockerfile }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.dockerfile }}-${{ matrix.arch }},mode=max
          provenance: false

  docker-manifest:
    runs-on: ubuntu-latest
    needs: docker-build
    outputs:
      version: ${{ steps.meta.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: "-debug"
          - suffix: ""
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: dominodatalab
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        env:
          DOCKER_METADATA_PR_HEAD_SHA: "true"
        with:
          images: |
            quay.io/domino/hephaestus
            ghcr.io/dominodatalab/hephaestus
          flavor: |
            suffix=${{ matrix.suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          # Get all tags from metadata
          TAGS="${{ steps.meta.outputs.tags }}"

          # For each tag, create a manifest combining amd64 and arm64 images
          echo "$TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Creating manifest for: $tag"

            # Extract the base tag without the final suffix to build arch-specific tags
            # The arch-specific images have tags like: image:version-suffix-arch
            # We want to create: image:version-suffix from image:version-suffix-amd64 + image:version-suffix-arm64
            amd64_tag="${tag}-amd64"
            arm64_tag="${tag}-arm64"

            echo "  amd64: $amd64_tag"
            echo "  arm64: $arm64_tag"

            docker buildx imagetools create -t "$tag" "$amd64_tag" "$arm64_tag"
          done

  helm:
    runs-on: ubuntu-latest
    needs: docker-manifest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4
      - id: helm_pkg
        name: Package Helm chart
        shell: bash
        run: |
          napp_version=${{ needs.docker-manifest.outputs.version }}
          app_version=${napp_version%-debug}
          if [[ "${app_version}" =~ ^(pr-[[:digit:]]+|main)$ ]]; then
            semantic_version="0.0.0-$app_version"
          else
            semantic_version="${app_version}"
          fi
          helm package deployments/helm/hephaestus \
          --app-version "$app_version" \
          --version "$semantic_version"
          echo "artifact=hephaestus-${semantic_version}.tgz" >> "${GITHUB_OUTPUT}"
      - name: Push Helm chart to GHCR
        uses: ./.github/actions/push-helm-chart
        with:
          registry: ghcr.io
          namespace: "${{ github.repository_owner }}/helm"
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          artifact: ${{ steps.helm_pkg.outputs.artifact }}
      - name: Push Helm chart to GCR
        uses: ./.github/actions/push-helm-chart
        with:
          registry: gcr.io
          namespace: ${{ secrets.GCR_NAMESPACE }}
          username: ${{ secrets.GCR_USERNAME }}
          password: ${{ secrets.GCR_PASSWORD }}
          password_base64_encoded: "true"
          artifact: ${{ steps.helm_pkg.outputs.artifact }}

  sdks:
    runs-on: ubuntu-latest
    needs: build
    env:
      MAVEN_DOCKER_IMAGE: maven:3-eclipse-temurin-17
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate SDKS
        run: |
          export BRANCH_NAME=$(echo ${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}} | sed -r 's|/+|-|g')
          make sdks
      - name: Generate Java JAR
        run: |
          docker run -q --rm \
            --workdir /wd \
            --volume "${HOME}"/.m2:/root/.m2 \
            --volume "$(pwd)"/sdks/java:/wd \
            "${MAVEN_DOCKER_IMAGE}" mvn --settings settings.xml package
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hephaestus-client-java.jar
          path: sdks/java/target/*.jar
          if-no-files-found: error
      - name: Publish JAR to GitHub
        run: |
          docker run --rm \
            --workdir /wd \
            --volume "${HOME}"/.m2:/root/.m2 \
            --volume "$(pwd)"/sdks/java:/wd \
            --env ARTIFACTORY_USERNAME=${{ secrets.ARTIFACTORY_USERNAME }} \
            --env ARTIFACTORY_PASSWORD=${{ secrets.ARTIFACTORY_PASSWORD }} \
            --env GITHUB_USERNAME=${{ github.actor }} \
            --env GITHUB_PASSWORD=${{ secrets.GITHUB_TOKEN }} \
            "${MAVEN_DOCKER_IMAGE}" mvn --settings settings.xml \
            --activate-profiles github -DskipTests deploy
      - name: Publish Jar to Artifactory
        uses: nick-fields/retry@v3
        with:
          retry_on: error
          max_attempts: 10
          timeout_minutes: 1
          retry_wait_seconds: 5
          command: |
            docker run --rm \
              --workdir /wd \
              --volume "${HOME}"/.m2:/root/.m2 \
              --volume $(pwd)/sdks/java:/wd \
              --env ARTIFACTORY_USERNAME=${{ secrets.ARTIFACTORY_USERNAME }} \
              --env ARTIFACTORY_PASSWORD=${{ secrets.ARTIFACTORY_PASSWORD }} \
              --env GITHUB_USERNAME=${{ github.actor }} \
              --env GITHUB_PASSWORD=${{ secrets.GITHUB_TOKEN }} \
              "${MAVEN_DOCKER_IMAGE}" mvn --settings settings.xml \
              --activate-profiles artifactory -DskipTests deploy
